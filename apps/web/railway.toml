[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
buildContext = "."

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[build.args]
NEXT_PUBLIC_API_URL = ""
NEXT_PUBLIC_TELEPHONY_URL = ""
