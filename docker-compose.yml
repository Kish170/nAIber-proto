services:
  ngrok:
    image: ngrok/ngrok:alpine
    container_name: naiber-ngrok
    command:
      - "start"
      - "--all"
      - "--config"
      - "/etc/ngrok.yml"
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml:ro
    ports:
      - "4040:4040"  
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTH_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4040"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  neo4j:
    image: neo4j:5-community
    container_name: naiber-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USERNAME:-neo4j}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    container_name: naiber-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: naiber-server
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      PHONE_NUMBER: ${PHONE_NUMBER}

      USE_DYNAMIC_NGROK: ${USE_DYNAMIC_NGROK}
      NGROK_API_URL: http://ngrok:4040/api/tunnels

      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_NUMBER: ${TWILIO_NUMBER}

      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVENLABS_BASE_URL: ${ELEVENLABS_BASE_URL}
      ELEVENLABS_AGENT_ID: ${ELEVENLABS_AGENT_ID}
      ELEVENLABS_NUMBER_ID: ${ELEVENLABS_NUMBER_ID}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID}
      ELEVENLABS_MODEL_ID: ${ELEVENLABS_MODEL_ID}
      ELEVENLABS_AUDIO_FORMAT: ${ELEVENLABS_AUDIO_FORMAT}
      ELEVENLABS_SAMPLE_RATE: ${ELEVENLABS_SAMPLE_RATE}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}

      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}

      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}

      REDIS_URL: redis://redis:6379

    volumes:
      - ./apps/server/src:/app/apps/server/src
    ports:
      - "3000:3000"
    depends_on:
      ngrok:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  llm-server:
    build:
      context: .
      dockerfile: apps/llm-server/Dockerfile
    container_name: naiber-llm-server
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}

      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}

      REDIS_URL: redis://redis:6379

      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVENLABS_BASE_URL: ${ELEVENLABS_BASE_URL}
      ELEVENLABS_AGENT_ID: ${ELEVENLABS_AGENT_ID}
      ELEVENLABS_NUMBER_ID: ${ELEVENLABS_NUMBER_ID}

      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_NUMBER: ${TWILIO_NUMBER}

      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}

      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE}

    volumes:
      - ./apps/llm-server/src:/app/apps/llm-server/src
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: naiber-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: 3002
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3003}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
    volumes:
      - ./apps/api/src:/app/apps/api/src
    ports:
      - "3002:3002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/status"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  redis_data:
    driver: local
  neo4j_data:
    driver: local